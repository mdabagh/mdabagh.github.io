<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">دسته‌بندی — بلاگ محمدسجاد دباغ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#0E2A47;
    --navy-line:#2C5580;
    --paper:#F1F3EE;
    --paper-alt:#E7EBE3;
    --ink:#10243D;
    --ink-soft:#51637A;
    --amber:#F2A541;
    --amber-dark:#C97F1E;
    --cyan-line:#8FC1DE;
    --maxw:1180px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  body{
    font-family:'Vazirmatn', sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.8;
    overflow-x:hidden;
  }

  .mono{font-family:'JetBrains Mono', monospace;}
  a{color:inherit; text-decoration:none;}
  ul{list-style:none;}
  section{position:relative;}
  :focus-visible{outline:2px solid var(--amber); outline-offset:3px;}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 28px;}

  /* ---------- NAV ---------- */
  header{
    position:fixed; top:0; right:0; left:0; z-index:100;
    background:rgba(14,42,71,0.92);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--navy-line);
  }
  .nav-inner{display:flex; align-items:center; justify-content:space-between; height:64px;}
  .brand{display:flex; align-items:center; gap:12px; color:#F1F3EE;}
  .brand-mark{
    width:34px; height:34px; border:1.5px solid var(--amber);
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace; font-weight:700; font-size:12px;
    color:var(--amber); flex-shrink:0;
  }
  .brand-name{font-weight:700; font-size:15px;}
  .brand-sub{font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--cyan-line); letter-spacing:0.5px;}

  nav{display:flex; align-items:center; gap:28px;}
  nav ul{display:flex; align-items:center; gap:28px;}
  nav a:not(.nav-cta){color:#D9E2EC; font-size:14px; font-weight:500; transition:color .2s;}
  nav a:not(.nav-cta):hover{color:#fff;}
  .nav-cta{background:var(--amber); color:var(--navy-deep) !important; padding:9px 18px; font-weight:700; font-size:13px; border:1px solid var(--amber); transition:all .2s ease; border-radius:4px;}
  .nav-cta:hover{background:transparent; color:var(--amber) !important;}
  .burger{display:none; flex-direction:column; gap:5px; background:none; border:0; cursor:pointer; padding:8px;}
  .burger span{width:22px; height:2px; background:#F1F3EE; display:block; transition:all .2s ease;}
  #navLinks{display:flex; align-items:center; gap:28px;}

  @media (max-width: 860px){
    .burger{display:flex;}
    #navLinks{
      position:absolute; top:64px; right:0; left:0; background:var(--navy-deep);
      flex-direction:column; align-items:flex-start; padding:20px 28px; gap:18px;
      border-bottom:1px solid var(--navy-line); display:none;
    }
    #navLinks.open{display:flex;}
    #navLinks a{width:100%;}
  }

  /* ---------- SECTION HEAD ---------- */
  .section-head{
    display:flex; justify-content:space-between; align-items:flex-end;
    border-bottom:2px solid var(--ink); padding-bottom:14px; margin-bottom:48px; gap:20px; flex-wrap:wrap;
  }
  .section-title{font-weight:800; font-size:clamp(1.5rem, 3.4vw, 2.15rem); color:var(--ink);}
  .sheet-meta{font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--ink-soft); white-space:nowrap;}
  section .wrap{padding-top:70px; padding-bottom:70px;}
  section:first-of-type .wrap{padding-top:130px;}

  .reveal{opacity:0; transform:translateY(24px); transition:opacity .7s ease, transform .7s ease;}
  .reveal.in{opacity:1; transform:none;}

  /* ================= CATEGORY INTRO (dark) ================= */
  #intro{background:var(--navy-deep); color:#EDF1F5;}
  .back-link{
    display:inline-flex; align-items:center; gap:6px; font-family:'JetBrains Mono', monospace;
    font-size:12px; color:var(--cyan-line); margin-bottom:22px;
  }
  .back-link:hover{color:var(--amber);}
  #intro h1{font-size:clamp(1.8rem, 4vw, 2.6rem); font-weight:900; margin-bottom:14px;}
  #intro p{font-size:15.5px; color:#C6D2DE; max-width:60ch;}
  .intro-meta{
    display:flex; gap:24px; margin-top:26px; padding-top:22px; border-top:1px solid var(--navy-line);
    font-family:'JetBrains Mono', monospace; font-size:12.5px; color:#9FB0C3;
  }
  .intro-meta b{color:var(--amber); font-weight:700;}

  /* ================= CARDS ================= */
  #posts{background:var(--paper-alt);}
  .proj-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:22px;}
  .proj-card{
    display:flex; flex-direction:column; height:100%;
    background:var(--paper); border:1px solid #C9D0C2; padding:26px;
    transition:border-color .2s, transform .2s; cursor:pointer;
  }
  .proj-card:hover{border-color:var(--amber-dark); transform:translateY(-3px);}
  .proj-num{font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--amber-dark); margin-bottom:12px; display:block;}
  .proj-card h3{font-size:17px; font-weight:700; margin-bottom:8px;}
  .proj-card p{font-size:13.5px; color:var(--ink-soft); margin-bottom:14px; flex-grow:1;}
  .post-date{
    font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--ink-soft);
    align-self:flex-start; margin-bottom:12px;
  }
  .read-link{
    font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--amber-dark);
    display:block; text-align:left; width:100%;
  }
  @media (max-width:820px){.proj-grid{grid-template-columns:1fr;}}

  /* ================= STATES ================= */
  .loading{grid-column:1/-1; text-align:center; padding:50px 0; color:var(--ink-soft);}
  .loading::after{content:''; animation:dots 1.4s steps(4) infinite;}
  @keyframes dots{0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%{content:'...';}}
  .empty{
    grid-column:1/-1; text-align:center; padding:50px 20px; color:var(--ink-soft);
    border:1px dashed #C9D0C2;
  }
  .empty small{display:block; margin-top:8px; font-family:'JetBrains Mono', monospace; font-size:11.5px;}
  .error{
    grid-column:1/-1; color:#c0392b; text-align:center; padding:20px;
    background:#fde8e8; border-radius:8px; margin:0;
  }
  .error small{display:block; margin-top:6px; font-family:'JetBrains Mono', monospace; font-size:11.5px;}

  footer{background:var(--navy-deep); color:#9FB0C3; padding:34px 0; text-align:center; font-size:13px; font-family:'JetBrains Mono', monospace;}
</style>
</head>
<body>

<header>
  <div class="wrap nav-inner">
    <div class="brand">
      <div class="brand-mark">MD</div>
      <div>
        <div class="brand-name">محمدسجاد دباغ</div>
        <div class="brand-sub">BLOG</div>
      </div>
    </div>
    <nav>
      <button class="burger" id="burgerBtn" aria-label="باز کردن منو">
        <span></span><span></span><span></span>
      </button>
      <ul id="navLinks">
        <li><a href="../blog.html">همه‌ی موضوعات</a></li>
        <li><a href="https://mdabagh.github.io" class="nav-cta">مشاهده رزومه</a></li>
      </ul>
    </nav>
  </div>
</header>

<!-- ================= CATEGORY INTRO ================= -->
<section id="intro">
  <div class="wrap">
    <a class="back-link reveal" href="../blog.html">→ بازگشت به بلاگ</a>
    <h1 id="categoryTitle" class="reveal">در حال بارگذاری...</h1>
    <p id="categorySummary" class="reveal"></p>
    <div class="intro-meta reveal">
      <span>تعداد یادداشت‌ها: <b id="postCount">۰</b></span>
    </div>
  </div>
</section>

<!-- ================= POSTS ================= -->
<section id="posts">
  <div class="wrap">
    <div class="section-head reveal">
      <div>
        <h2 class="section-title">همه‌ی یادداشت‌ها</h2>
      </div>
      <div class="sheet-meta" id="sortMeta">جدیدترین اول</div>
    </div>

    <div class="proj-grid" id="postsGrid">
      <div class="loading">بارگذاری یادداشت‌ها</div>
    </div>
  </div>
</section>

<footer>
  © ۲۰۲۶ محمدسجاد دباغ
</footer>

<script>
// ============================================
// مدیریت صفحه‌ی یک دسته‌بندی — می‌خونه از پوشه‌ی خودش
// این فایل باید با اسم index.html داخل هر پوشه‌ی
// دسته‌بندی (مثلاً design-system/index.html) قرار بگیره
// ============================================

class CategoryManager {
  constructor() {
    this.posts = [];
    this.info = null;
  }

  toPersianNumber(num) {
    const persian = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
    return num.toString().replace(/\d/g, d => persian[parseInt(d)]);
  }

  async loadInfo() {
    try {
      const res = await fetch('detals.json');
      if (res.ok) return await res.json();
    } catch (e) {
      console.error('Error loading detals.json:', e);
    }
    return null;
  }

  async scanDirectory(path) {
    try {
      const res = await fetch(`${path}/index.json`);
      if (res.ok) {
        const data = await res.json();
        return data.files || [];
      }
      return [];
    } catch (e) {
      console.error(`Error scanning ${path}:`, e);
      return [];
    }
  }

  async loadPosts() {
    const posts = [];
    const files = await this.scanDirectory('markdouns');

    for (const file of files) {
      if (!file.endsWith('.json')) continue;
      try {
        const res = await fetch(`markdouns/${file}`);
        if (!res.ok) continue;
        const postData = await res.json();
        const slug = file.replace('.json', '');

        let content = '';
        try {
          const mdRes = await fetch(`markdouns/${slug}.md`);
          if (mdRes.ok) content = await mdRes.text();
        } catch (e) {
          // فایل مارک‌داون ندارد
        }

        posts.push({
          id: slug,
          title: postData.title || 'بدون عنوان',
          summary: postData.summary || '...',
          content,
          date: postData.date || new Date().toISOString().split('T')[0],
          url: `${slug}.html`
        });
      } catch (e) {
        console.error(`Error loading post ${file}:`, e);
      }
    }

    posts.sort((a, b) => new Date(b.date) - new Date(a.date));
    this.posts = posts;
    return posts;
  }

  formatDate(dateStr) {
    try {
      const d = new Date(dateStr);
      return d.toLocaleDateString('fa-IR', { year: 'numeric', month: 'long', day: 'numeric' });
    } catch (e) {
      return dateStr;
    }
  }

  renderIntro() {
    const titleEl = document.getElementById('categoryTitle');
    const summaryEl = document.getElementById('categorySummary');
    const pageTitleEl = document.getElementById('pageTitle');

    if (this.info) {
      titleEl.textContent = this.info.name || 'دسته‌بندی';
      summaryEl.textContent = this.info.summary || '';
      pageTitleEl.textContent = `${this.info.name} — بلاگ محمدسجاد دباغ`;
    } else {
      titleEl.textContent = 'دسته‌بندی یافت نشد';
      summaryEl.textContent = 'فایل detals.json در این پوشه پیدا نشد یا خوانده نشد.';
    }
  }

  renderPosts() {
    const grid = document.getElementById('postsGrid');
    const countEl = document.getElementById('postCount');
    if (!grid) return;

    if (countEl) countEl.textContent = this.toPersianNumber(this.posts.length);

    if (this.posts.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          هنوز یادداشتی در این دسته منتشر نشده
          <small>یک فایل JSON در پوشه‌ی markdouns این دسته اضافه کنید</small>
        </div>
      `;
      return;
    }

    grid.innerHTML = this.posts.map((post, index) => `
      <a class="proj-card reveal" href="${post.url}">
        <span class="proj-num">${this.toPersianNumber(index + 1).padStart(2, '۰')}</span>
        <span class="post-date">${this.formatDate(post.date)}</span>
        <h3>${post.title}</h3>
        <p>${post.summary}</p>
        <span class="read-link">مشاهده یادداشت ←</span>
      </a>
    `).join('');

    this.initReveal();
  }

  initReveal() {
    const revealEls = document.querySelectorAll('.reveal:not(.in)');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.15 });
    revealEls.forEach(el => io.observe(el));
  }

  async loadAll() {
    try {
      this.info = await this.loadInfo();
      this.renderIntro();

      await this.loadPosts();
      this.renderPosts();
    } catch (error) {
      console.error('Error loading category page:', error);
      document.getElementById('postsGrid').innerHTML = `
        <div class="error">
          <p>خطا در بارگذاری یادداشت‌ها</p>
          <small>${error.message}</small>
        </div>
      `;
    }
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  const burger = document.getElementById('burgerBtn');
  const navLinks = document.getElementById('navLinks');

  if (burger && navLinks) {
    burger.addEventListener('click', () => navLinks.classList.toggle('open'));
    navLinks.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => navLinks.classList.remove('open'));
    });
  }

  const manager = new CategoryManager();
  await manager.loadAll();

  // reveal انیمیشن برای بخش intro
  document.querySelectorAll('#intro .reveal').forEach(el => el.classList.add('in'));
});
</script>

</body>
</html>
