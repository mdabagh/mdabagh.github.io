<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بلاگ محمدسجاد دباغ — یادداشت‌های بک‌اند</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#0E2A47;
    --navy-line:#2C5580;
    --paper:#F1F3EE;
    --paper-alt:#E7EBE3;
    --ink:#10243D;
    --ink-soft:#51637A;
    --amber:#F2A541;
    --amber-dark:#C97F1E;
    --cyan-line:#8FC1DE;
    --maxw:1180px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  body{
    font-family:'Vazirmatn', sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.8;
    overflow-x:hidden;
  }

  .mono{font-family:'JetBrains Mono', monospace;}
  a{color:inherit; text-decoration:none;}
  ul{list-style:none;}
  section{position:relative;}
  :focus-visible{outline:2px solid var(--amber); outline-offset:3px;}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 28px;}

  /* ---------- NAV ---------- */
  header{
    position:fixed; top:0; right:0; left:0; z-index:100;
    background:rgba(14,42,71,0.92);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--navy-line);
  }
  .nav-inner{display:flex; align-items:center; justify-content:space-between; height:64px;}
  .brand{display:flex; align-items:center; gap:12px; color:#F1F3EE;}
  .brand-mark{
    width:34px; height:34px; border:1.5px solid var(--amber);
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace; font-weight:700; font-size:12px;
    color:var(--amber); flex-shrink:0;
  }
  .brand-name{font-weight:700; font-size:15px;}
  .brand-sub{font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--cyan-line); letter-spacing:0.5px;}

  nav{display:flex; align-items:center; gap:28px;}
  nav ul{display:flex; align-items:center; gap:28px;}
  .nav-cta{background:var(--amber); color:var(--navy-deep) !important; padding:9px 18px; font-weight:700; font-size:13px; border:1px solid var(--amber); transition:all .2s ease; border-radius:4px;}
  .nav-cta:hover{background:transparent; color:var(--amber) !important;}
  .burger{display:none; flex-direction:column; gap:5px; background:none; border:0; cursor:pointer; padding:8px;}
  .burger span{width:22px; height:2px; background:#F1F3EE; display:block; transition:all .2s ease;}
  #navLinks{display:flex; align-items:center; gap:28px;}

  @media (max-width: 860px){
    .burger{display:flex;}
    #navLinks{
      position:absolute; top:64px; right:0; left:0; background:var(--navy-deep);
      flex-direction:column; align-items:flex-start; padding:20px 28px; gap:18px;
      border-bottom:1px solid var(--navy-line); display:none;
    }
    #navLinks.open{display:flex;}
    #navLinks a{width:100%;}
  }

  /* ---------- SECTION HEAD ---------- */
  .section-head{
    display:flex; justify-content:space-between; align-items:flex-end;
    border-bottom:2px solid var(--ink); padding-bottom:14px; margin-bottom:48px; gap:20px; flex-wrap:wrap;
  }
  .section-title{font-weight:800; font-size:clamp(1.5rem, 3.4vw, 2.15rem); color:var(--ink);}
  .sheet-meta{font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--ink-soft); white-space:nowrap;}
  section .wrap{padding-top:70px; padding-bottom:70px;}
  section:first-of-type .wrap{padding-top:130px;}

  .reveal{opacity:0; transform:translateY(24px); transition:opacity .7s ease, transform .7s ease;}
  .reveal.in{opacity:1; transform:none;}

  /* ================= CATEGORY ================= */
  #category{background:var(--navy-deep); color:#EDF1F5;}
  #category .section-head{border-bottom-color:var(--navy-line);}
  #category .section-title{color:#EDF1F5;}
  #category .sheet-meta{color:#9FB0C3;}
  #category .proj-card{background:transparent; border:1px solid var(--navy-line);}
  #category .proj-card:hover{border-color:var(--amber);}
  #category .proj-card h3{color:#EDF1F5;}
  #category .proj-card p{color:#B9C6D4;}
  #category .read-link{color:var(--amber);}

  /* ================= CARDS (shared) ================= */
  .proj-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:22px;}
  .proj-card{
    display:block; background:var(--paper); border:1px solid #C9D0C2; padding:26px;
    transition:border-color .2s, transform .2s;
  }
  .proj-card:hover{border-color:var(--amber-dark); transform:translateY(-3px);}
  .proj-num{font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--amber-dark); margin-bottom:12px; display:block;}
  .proj-card h3{font-size:17px; font-weight:700; margin-bottom:8px;}
  .proj-card p{font-size:13.5px; color:var(--ink-soft); margin-bottom:14px;}
  .badge{
    display:inline-block; font-family:'JetBrains Mono', monospace; font-size:10.5px;
    padding:4px 10px; border:1px solid var(--amber-dark); color:var(--amber-dark); margin-bottom:12px;
    border-radius:3px;
  }
  .read-link{font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--amber-dark); display:inline-block; width:100%; text-align:left;}
  #category .read-link{color:var(--amber);}
  
  @media (max-width:820px){.proj-grid{grid-template-columns:1fr;}}

  /* ================= POSTS ================= */
  #posts{background:var(--paper-alt);}
  
  /* ================= LOADING ================= */
  .loading{text-align:center; padding:40px 0; color:var(--ink-soft);}
  .loading::after{content:'...'; animation:dots 1.5s steps(4) infinite;}
  @keyframes dots{0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%{content:'...';}}

  /* ================= ERROR ================= */
  .error{color:#e74c3c; text-align:center; padding:20px; background:#fde8e8; border-radius:8px; margin:20px 0;}

  footer{background:var(--navy-deep); color:#9FB0C3; padding:34px 0; text-align:center; font-size:13px; font-family:'JetBrains Mono', monospace;}
</style>
</head>
<body>

<header>
  <div class="wrap nav-inner">
    <div class="brand">
      <div class="brand-mark">MD</div>
      <div>
        <div class="brand-name">محمدسجاد دباغ</div>
        <div class="brand-sub">BLOG</div>
      </div>
    </div>
    <nav>
      <button class="burger" id="burgerBtn" aria-label="باز کردن منو">
        <span></span><span></span><span></span>
      </button>
      <ul id="navLinks">
        <li><a href="https://mdabagh.github.io" class="nav-cta">مشاهده رزومه</a></li>
      </ul>
    </nav>
  </div>
</header>

<!-- ================= CATEGORY ================= -->
<section id="category">
  <div class="wrap">
    <div class="proj-grid" id="categoryGrid">
      <div class="loading">بارگذاری دسته‌بندی‌ها</div>
    </div>
  </div>
</section>

<!-- ================= POSTS ================= -->
<section id="posts">
  <div class="wrap">
    <div class="section-head reveal">
      <div>
        <h2 class="section-title">آخرین یادداشت‌ها</h2>
      </div>
      <div class="sheet-meta" id="postCount">۰ مورد</div>
    </div>

    <div class="proj-grid" id="postsGrid">
      <div class="loading">بارگذاری یادداشت‌ها</div>
    </div>
  </div>
</section>

<footer>
  © ۲۰۲۶ محمدسجاد دباغ
</footer>

<script>
// ============================================
// سیستم کامل مدیریت دیتاهای بلاگ
// ============================================

class BlogManager {
  constructor() {
    this.categories = [];
    this.posts = [];
    this.basePath = '';
  }

  // تبدیل عدد به فارسی
  toPersianNumber(num) {
    const persian = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
    return num.toString().replace(/\d/g, d => persian[parseInt(d)]);
  }

  // اسکن دایرکتوری‌ها با استفاده از fetch
  async scanDirectory(path) {
    try {
      // تلاش برای دریافت لیست فایل‌ها از سرور
      const response = await fetch(`${path}/index.json`);
      if (response.ok) {
        const data = await response.json();
        return data.files || [];
      }
      return [];
    } catch (error) {
      console.error(`Error scanning directory ${path}:`, error);
      return [];
    }
  }

  // پیدا کردن تمام دایرکتوری‌های دسته‌بندی
  async findCategories() {
    try {
      // لیست دسته‌بندی‌های پیش‌فرض
      const possibleCategories = ['design-system', 'todo'];
      const categories = [];

      for (const cat of possibleCategories) {
        try {
          // بررسی وجود detals.json
          const response = await fetch(`${cat}/detals.json`);
          if (response.ok) {
            const details = await response.json();
            categories.push({
              id: cat,
              name: details.name || cat,
              summary: details.summary || '',
              path: cat
            });
          }
        } catch (e) {
          // دایرکتوری وجود ندارد
        }
      }

      return categories;
    } catch (error) {
      console.error('Error finding categories:', error);
      return [];
    }
  }

  // بارگذاری پست‌های یک دسته‌بندی
  async loadCategoryPosts(category) {
    const posts = [];
    try {
      // خواندن لیست فایل‌ها
      const files = await this.scanDirectory(`${category.path}/markdouns`);
      
      for (const file of files) {
        if (file.endsWith('.json')) {
          try {
            const response = await fetch(`${category.path}/markdouns/${file}`);
            if (response.ok) {
              const postData = await response.json();
              const slug = file.replace('.json', '');
              
              // تلاش برای خواندن فایل Markdown
              let content = '';
              try {
                const mdResponse = await fetch(`${category.path}/markdouns/${slug}.md`);
                if (mdResponse.ok) {
                  content = await mdResponse.text();
                }
              } catch (e) {
                // فایل Markdown وجود ندارد
              }
              
              posts.push({
                id: slug,
                category: category.id,
                categoryName: category.name,
                title: postData.title || 'بدون عنوان',
                summary: postData.summary || '...',
                content: content,
                date: postData.date || new Date().toISOString().split('T')[0],
                url: `${category.path}/${slug}.html`
              });
            }
          } catch (e) {
            console.error(`Error loading post ${file}:`, e);
          }
        }
      }
    } catch (error) {
      console.error(`Error loading posts for category ${category.id}:`, error);
    }
    return posts;
  }

  // بارگذاری همه پست‌ها
  async loadAllPosts() {
    let allPosts = [];
    for (const cat of this.categories) {
      const posts = await this.loadCategoryPosts(cat);
      allPosts = allPosts.concat(posts);
    }
    
    // مرتب‌سازی بر اساس تاریخ (جدیدترین اول)
    allPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
    this.posts = allPosts;
    return allPosts;
  }

  // رندر کردن دسته‌بندی‌ها
  renderCategories() {
    const grid = document.getElementById('categoryGrid');
    if (!grid) return;
    
    if (this.categories.length === 0) {
      grid.innerHTML = `
        <div class="error" style="grid-column:1/-1;">
          <p>هیچ دسته‌بندی یافت نشد</p>
          <small>لطفاً حداقل یک دایرکتوری با فایل detals.json ایجاد کنید</small>
        </div>
      `;
      return;
    }
    
    grid.innerHTML = this.categories.map((cat, index) => `
      <a class="proj-card reveal" href="${cat.path}/index.html">
        <span class="proj-num">${this.toPersianNumber(index + 1).padStart(2, '۰')}</span>
        <h3>${cat.name}</h3>
        <p>${cat.summary}</p>
        <span class="read-link">مشاهده یادداشت‌ها ←</span>
      </a>
    `).join('');
    
    this.initReveal();
  }

  // رندر کردن پست‌ها
  renderPosts() {
    const grid = document.getElementById('postsGrid');
    const count = document.getElementById('postCount');
    if (!grid) return;
    
    if (this.posts.length === 0) {
      grid.innerHTML = `
        <div class="error" style="grid-column:1/-1;">
          <p>هیچ یادداشتی یافت نشد</p>
          <small>لطفاً حداقل یک فایل JSON در پوشه markdouns ایجاد کنید</small>
        </div>
      `;
      if (count) count.textContent = '۰ مورد';
      return;
    }
    
    if (count) {
      count.textContent = `${this.toPersianNumber(this.posts.length)} مورد`;
    }
    
    // فقط ۴ پست آخر را نمایش می‌دهیم
    const displayPosts = this.posts.slice(0, 4);
    
    grid.innerHTML = displayPosts.map((post, index) => `
      <article class="proj-card reveal">
        <span class="proj-num">${this.toPersianNumber(index + 1).padStart(2, '۰')}</span>
        <a href="${post.url}" class="badge">${post.categoryName}</a>
        <h3>${post.title}</h3>
        <p>${post.summary}</p>
        <a href="${post.url}" class="read-link">مشاهده یادداشت ←</a>
      </article>
    `).join('');
    
    this.initReveal();
  }

  // راه‌اندازی مجدد انیمیشن reveal
  initReveal() {
    const revealEls = document.querySelectorAll('.reveal:not(.in)');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { 
        if(e.isIntersecting){ 
          e.target.classList.add('in'); 
          io.unobserve(e.target); 
        } 
      });
    }, {threshold:0.15});
    revealEls.forEach(el => io.observe(el));
  }

  // بارگذاری کامل دیتاها
  async loadAll() {
    try {
      // پیدا کردن دسته‌بندی‌ها
      this.categories = await this.findCategories();
      this.renderCategories();
      
      // بارگذاری پست‌ها
      await this.loadAllPosts();
      this.renderPosts();
    } catch (error) {
      console.error('Error loading blog data:', error);
      document.getElementById('categoryGrid').innerHTML = `
        <div class="error" style="grid-column:1/-1;">
          <p>خطا در بارگذاری دیتاها</p>
          <small>${error.message}</small>
        </div>
      `;
    }
  }
}

// ============================================
// راه‌اندازی
// ============================================

document.addEventListener('DOMContentLoaded', async () => {
  // منوی همبرگر
  const burger = document.getElementById('burgerBtn');
  const navLinks = document.getElementById('navLinks');
  
  if (burger && navLinks) {
    burger.addEventListener('click', () => {
      navLinks.classList.toggle('open');
    });

    navLinks.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        navLinks.classList.remove('open');
      });
    });
  }

  // بارگذاری دیتاهای بلاگ
  const blogManager = new BlogManager();
  await blogManager.loadAll();
});
</script>

</body>
</html>
