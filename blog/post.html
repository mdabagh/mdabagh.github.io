<style>
  :root{
    --navy-deep:#0E2A47;
    --navy-line:#2C5580;
    --paper:#F1F3EE;
    --paper-alt:#E7EBE3;
    --ink:#10243D;
    --ink-soft:#51637A;
    --amber:#F2A541;
    --amber-dark:#C97F1E;
    --cyan-line:#8FC1DE;
    --maxw:1180px;
    --maxw-article:760px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  body{
    font-family:'Vazirmatn', sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.8;
    overflow-x:hidden;
  }

  .mono{font-family:'JetBrains Mono', monospace;}
  a{color:inherit; text-decoration:none;}
  ul{list-style:none;}
  section{position:relative;}
  :focus-visible{outline:2px solid var(--amber); outline-offset:3px;}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 28px;}
  .wrap-article{max-width:var(--maxw-article); margin:0 auto; padding:0 28px;}

  /* ---------- NAV ---------- */
  header{
    position:fixed; top:0; right:0; left:0; z-index:100;
    background:rgba(14,42,71,0.92);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--navy-line);
  }
  .nav-inner{display:flex; align-items:center; justify-content:space-between; height:64px;}
  .brand{display:flex; align-items:center; gap:12px; color:#F1F3EE;}
  .brand-mark{
    width:34px; height:34px; border:1.5px solid var(--amber);
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace; font-weight:700; font-size:12px;
    color:var(--amber); flex-shrink:0;
  }
  .brand-name{font-weight:700; font-size:15px;}
  .brand-sub{font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--cyan-line); letter-spacing:0.5px;}

  nav{display:flex; align-items:center; gap:28px;}
  nav ul{display:flex; align-items:center; gap:28px;}
  nav a:not(.nav-cta){color:#D9E2EC; font-size:14px; font-weight:500; transition:color .2s;}
  nav a:not(.nav-cta):hover{color:#fff;}
  .nav-cta{background:var(--amber); color:var(--navy-deep) !important; padding:9px 18px; font-weight:700; font-size:13px; border:1px solid var(--amber); transition:all .2s ease; border-radius:4px;}
  .nav-cta:hover{background:transparent; color:var(--amber) !important;}
  .burger{display:none; flex-direction:column; gap:5px; background:none; border:0; cursor:pointer; padding:8px;}
  .burger span{width:22px; height:2px; background:#F1F3EE; display:block; transition:all .2s ease;}
  #navLinks{display:flex; align-items:center; gap:28px;}

  @media (max-width: 860px){
    .burger{display:flex;}
    #navLinks{
      position:absolute; top:64px; right:0; left:0; background:var(--navy-deep);
      flex-direction:column; align-items:flex-start; padding:20px 28px; gap:18px;
      border-bottom:1px solid var(--navy-line); display:none;
    }
    #navLinks.open{display:flex;}
    #navLinks a{width:100%;}

  .reveal{opacity:0; transform:translateY(24px); transition:opacity .7s ease, transform .7s ease;}
  .reveal.in{opacity:1; transform:none;}

  /* ================= ARTICLE HEADER (dark) ================= */
  #article-head{background:var(--navy-deep); color:#EDF1F5; padding-top:150px; padding-bottom:60px;}
  .back-link{
    display:inline-flex; align-items:center; gap:6px; font-family:'JetBrains Mono', monospace;

    display:inline-block; font-family:'JetBrains Mono', monospace; font-size:10.5px;

    font-family:'JetBrains Mono', monospace; font-size:12.5px; color:#9FB0C3;

  /* ================= ARTICLE BODY ================= */

  .prose{font-size:16.5px; color:var(--ink);}

  .prose h1,.prose h2,.prose h3,.prose h4{font-weight:800; line-height:1.5; margin-top:1.8em;}
  .prose h1{font-size:1.7rem; border-bottom:2px solid var(--ink); padding-bottom:10px;}
  .prose h2{font-size:1.4rem; border-bottom:1px solid #D8DED6; padding-bottom:8px;}
  .prose h3{font-size:1.18rem; color:var(--amber-dark);}
  .prose h4{font-size:1.02rem;}
  .prose p{line-height:1.9;}
  .prose a{color:var(--amber-dark); border-bottom:1px solid var(--amber-dark);}
  .prose a:hover{color:var(--amber);}
  .prose strong{font-weight:800;}
  .prose em{font-style:italic;}
  .prose ul,.prose ol{padding-inline-start:1.6em;}
  .prose ul{list-style:disc;}
  .prose ol{list-style:decimal;}
  .prose li + li{margin-top:.4em;}
  .prose blockquote{
    border-inline-start:3px solid var(--amber); background:var(--paper-alt);
    padding:14px 20px; color:var(--ink-soft); font-size:15.5px;
  }
  .prose code{
    font-family:'JetBrains Mono', monospace; font-size:.86em; background:var(--paper-alt);
    padding:2px 6px; border-radius:3px; color:var(--amber-dark); direction:ltr; unicode-bidi:embed;
  }
  .prose pre{
    background:var(--navy-deep); color:#DCE5EE; padding:18px 20px; overflow-x:auto;
    border:1px solid var(--navy-line); direction:ltr; text-align:left;
  }
  .prose pre code{background:none; padding:0; color:inherit; font-size:13.5px; line-height:1.7;}
  .prose img{max-width:100%; height:auto; border:1px solid #D8DED6;}
  .prose hr{border:none; border-top:1px dashed #C9D0C2; margin:2em 0;}
  .prose table{width:100%; border-collapse:collapse; font-size:14.5px;}
  .prose th,.prose td{border:1px solid #D8DED6; padding:9px 12px; text-align:right;}
  .prose th{background:var(--paper-alt); font-weight:700;}

  /* ================= READING PROGRESS ================= */
  #readingProgressBar{
    position:fixed; top:0; right:0; left:0; height:3px; background:var(--amber);
    width:0%; z-index:200; transition:width .15s ease;
  }
  .resume-toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--navy-deep); color:#EDF1F5; padding:12px 20px; border-radius:8px;
    display:flex; align-items:center; gap:14px; font-size:13.5px; z-index:150;
    box-shadow:0 8px 24px rgba(14,42,71,0.35); opacity:0; pointer-events:none;
    transition:opacity .3s ease, transform .3s ease; border:1px solid var(--navy-line);
  }
  .resume-toast.show{opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto;}
  .resume-toast button{
    font-family:'Vazirmatn', sans-serif; font-size:12.5px; font-weight:700; cursor:pointer;
    border:0; border-radius:5px; padding:6px 12px;
  }
  .resume-toast .btn-go{background:var(--amber); color:var(--navy-deep);}
  .resume-toast .btn-dismiss{background:transparent; color:#9FB0C3;}

  /* چیپ دائمی گوشه صفحه: وضعیت ذخیره‌سازی زنده + دکمه‌ی همیشگی برای ادامه‌ی مطالعه */
  .progress-chip{
    position:fixed; bottom:22px; left:22px; z-index:180;
    display:flex; align-items:center; gap:10px;
    background:#EDF1F5; color:var(--ink); border:1px solid #C9D0C2;
    padding:10px 14px; border-radius:10px; max-width:280px;
    font-size:12px; line-height:1.6; cursor:pointer;
    box-shadow:0 6px 18px rgba(14,42,71,0.14);
    opacity:0; transform:translateY(12px); pointer-events:none;
    transition:opacity .35s ease, transform .35s ease;
  }
  .progress-chip.show{opacity:1; transform:translateY(0); pointer-events:auto;}
  .progress-chip:hover{border-color:var(--amber-dark);}
  .progress-chip-dot{
    width:9px; height:9px; border-radius:50%; background:var(--amber-dark); flex-shrink:0;
    animation:chipPulse 1.8s ease-in-out infinite;
  }
  @keyframes chipPulse{0%,100%{opacity:1;} 50%{opacity:.35;}}
  .progress-chip.done .progress-chip-dot{background:#2e8b57; animation:none;}
  .progress-chip-close{
    background:none; border:0; color:var(--ink-soft); cursor:pointer; font-size:14px;
    padding:0 0 0 4px; line-height:1; flex-shrink:0;
  }

  .loading, .empty, .error{text-align:center; padding:60px 0; color:var(--ink-soft);}
  .loading::after{content:''; animation:dots 1.4s steps(4) infinite;}
  @keyframes dots{0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%{content:'...';}}
  .error{color:#c0392b;}
  .error small{display:block; margin-top:6px; font-family:'JetBrains Mono', monospace; font-size:11.5px;}

  footer{background:var(--navy-deep); color:#9FB0C3; padding:34px 0; text-align:center; font-size:13px; font-family:'JetBrains Mono', monospace;}
  footer span{color:var(--amber);}
</style>

<script type="module">
import markdownIt from 'markdown-it';

const SITE_BASE = 'https://mdabagh.github.io';

function setMeta(id, content) {
  const el = document.getElementById(id);
  if (el) el.setAttribute('content', content);
}

function setCanonical(url) {
  const el = document.getElementById('canonicalLink');
  if (el) el.href = url;
}

function injectSchema(data) {
  const old = document.getElementById('pageSchema');
  if (old) old.remove();
  const script = document.createElement('script');
  script.id = 'pageSchema';
  script.type = 'application/ld+json';
  script.textContent = JSON.stringify(data);
  document.head.appendChild(script);
}

// ============================================
// سیستم ذخیره پیشرفت مطالعه (localStorage)
// همون منطق index.html — اینجا کاربر ادامه می‌ده
// ============================================

class ReadingProgressStore {
  constructor(prefix = 'readingProgress') { this.prefix = prefix; }
  key(categoryId, slug) { return `${this.prefix}:${categoryId}:${slug}`; }

  save(categoryId, slug, { percent, scrollY, title }) {
    try {
      const data = {
        percent: Math.max(0, Math.min(100, Math.round(percent))),
        scrollY: scrollY || 0,
        title: title || '',
        updatedAt: Date.now()
      };
      localStorage.setItem(this.key(categoryId, slug), JSON.stringify(data));
      return data;
    } catch (e) {
      console.error('Error saving reading progress:', e);
      return null;
    }
  }

  get(categoryId, slug) {
    try {
      const raw = localStorage.getItem(this.key(categoryId, slug));
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      console.error('Error reading progress:', e);
      return null;
    }
  }

  clear(categoryId, slug) {
    try { localStorage.removeItem(this.key(categoryId, slug)); }
    catch (e) { console.error('Error clearing progress:', e); }
  }
}

// ============================================
// نمایش یک پست — تک صفحه‌ی generic برای همه‌ی دسته‌ها
// آدرس: blog/post.html?cat=design-system&slug=FORWARD
// ============================================

class PostViewer {
  constructor() {
    this.md = markdownIt({
      html: false,       // اجازه‌ی HTML خام نده (امنیت)
      linkify: true,      // آدرس‌های خام رو خودکار لینک کن
      typographer: false, // برای متن فارسی خاموش بمونه بهتره
      breaks: false
    });
    const params = new URLSearchParams(window.location.search);
    this.cat = params.get('cat');
    this.slug = params.get('slug');
    this.progressStore = new ReadingProgressStore();
    this._saveTimeout = null;
  }

  formatDate(dateStr) {
    try {
      return new Date(dateStr).toLocaleDateString('fa-IR', { year: 'numeric', month: 'long', day: 'numeric' });
    } catch (e) {
      return dateStr;
    }
  }

  toPersianNumber(num) {
    const persian = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
    return num.toString().replace(/\d/g, d => persian[parseInt(d)]);
  }

  estimateReadTime(text) {
    const words = text.trim().split(/\s+/).length;
    const minutes = Math.max(1, Math.round(words / 180));
    return `${this.toPersianNumber(minutes)} دقیقه مطالعه`;
  }

  showError(message) {
    document.getElementById('articleTitle').textContent = 'یادداشت پیدا نشد';
    document.getElementById('articleContent').innerHTML = `
      <div class="error">
        <p>${message}</p>
        <small>مسیر مورد انتظار: blog/${this.cat || '{cat}'}/markdouns/${this.slug || '{slug}'}.json</small>
      </div>
    `;
  }

  async load() {
    if (!this.cat || !this.slug) {
      this.showError('دسته‌بندی یا اسلاگ پست در آدرس مشخص نشده (?cat=...&slug=...)');
      return;
    }

    // لینک بازگشت به صفحه دسته‌بندی
    document.getElementById('backLink').href = `category.html?cat=${this.cat}`;

    // اسم دسته‌بندی برای نشان‌دادن بج
    try {
      const catRes = await fetch(`${this.cat}/detals.json`);
      if (catRes.ok) {
        const catData = await catRes.json();
        if (catData.name) {
          const catEl = document.getElementById('articleCategory');
          catEl.textContent = catData.name;
          catEl.style.display = 'inline-block';
        }
      }
    } catch (e) {
      console.error('Error loading category info:', e);
    }

    let postData;
    try {
      const res = await fetch(`${this.cat}/markdouns/${this.slug}.json`);
      if (!res.ok) throw new Error('فایل متادیتای پست پیدا نشد');
      postData = await res.json();
    } catch (e) {
      this.showError('این یادداشت پیدا نشد یا هنوز منتشر نشده.');
      return;
    }

    let mdContent = '';
    try {
      const mdRes = await fetch(`${this.cat}/markdouns/${this.slug}.md`);
      if (mdRes.ok) mdContent = await mdRes.text();
    } catch (e) {
      console.error('Error loading markdown file:', e);
    }

    const pageUrl = `${SITE_BASE}/blog/post.html?cat=${this.cat}&slug=${this.slug}`;
    const title = `${postData.title || 'یادداشت'} — بلاگ محمدسجاد دباغ`;
    const description = postData.summary || 'یادداشت فنی محمدسجاد دباغ';

    document.title = title;
    document.getElementById('pageTitle').textContent = title;
    setMeta('metaDescription', description);
    setMeta('ogTitle', title);
    setMeta('ogDescription', description);
    setMeta('ogUrl', pageUrl);
    setMeta('twitterTitle', title);
    setMeta('twitterDescription', description);
    setCanonical(pageUrl);

    const catName = document.getElementById('articleCategory').textContent || this.cat;
    injectSchema({
      '@context': 'https://schema.org',
      '@type': 'BlogPosting',
      headline: postData.title || 'یادداشت',
      description: description,
      datePublished: postData.date || undefined,
      author: { '@type': 'Person', name: 'محمدسجاد دباغ', url: SITE_BASE },
      url: pageUrl,
      inLanguage: 'fa',
      isPartOf: { '@type': 'Blog', name: 'بلاگ محمدسجاد دباغ', url: `${SITE_BASE}/blog/` },
      breadcrumb: {
        '@type': 'BreadcrumbList',
        itemListElement: [
          { '@type': 'ListItem', position: 1, name: 'بلاگ', item: `${SITE_BASE}/blog/` },
          { '@type': 'ListItem', position: 2, name: catName, item: `${SITE_BASE}/blog/category.html?cat=${this.cat}` },
          { '@type': 'ListItem', position: 3, name: postData.title, item: pageUrl }
        ]
      }
    });

    document.getElementById('articleTitle').textContent = postData.title || 'بدون عنوان';
    document.getElementById('articleDate').textContent = postData.date ? this.formatDate(postData.date) : '';
    document.getElementById('articleReadTime').textContent = mdContent ? this.estimateReadTime(mdContent) : '';

    const contentEl = document.getElementById('articleContent');
    if (!mdContent) {
      contentEl.innerHTML = `<div class="empty">متن این یادداشت هنوز نوشته نشده.</div>`;
      return;
    }

    const html = this.md.render(mdContent);
    contentEl.innerHTML = `<article class="prose">${html}</article>`;

    this.revealAll();
    this.setupReadingProgress();
  }

  revealAll() {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
  }

  // ============================================
  // نشانه‌گذاری و ادامه‌ی مطالعه
  // ============================================
  toPersianNumber(num) {
    const persian = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
    return num.toString().replace(/\d/g, d => persian[parseInt(d)]);
  }

  calcScrollPercent() {
    const scrollTop = window.scrollY || document.documentElement.scrollTop;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    if (docHeight <= 0) return 100;
    return Math.max(0, Math.min(100, (scrollTop / docHeight) * 100));
  }

  setupReadingProgress() {
    const progressBarEl = document.getElementById('readingProgressBar');
    const toastEl = document.getElementById('resumeToast');
    const toastTextEl = document.getElementById('resumeToastText');
    const goBtn = document.getElementById('resumeGoBtn');
    const dismissBtn = document.getElementById('resumeDismissBtn');
    const chipEl = document.getElementById('progressChip');
    const chipTextEl = document.getElementById('progressChipText');
    const chipCloseBtn = document.getElementById('progressChipClose');

    let lastSavedScrollY = 0;
    let chipDismissedByUser = false;

    const scrollToSaved = (y) => window.scrollTo({ top: y, behavior: 'smooth' });

    // چیپ گوشه صفحه رو با متن تازه نشون بده (مگر اینکه خود کاربر بسته باشدش)
    const updateChip = (percent, { done = false } = {}) => {
      if (chipDismissedByUser) return;
      chipEl.classList.toggle('done', done);
      chipTextEl.textContent = done
        ? 'این یادداشت رو کامل مطالعه کردی ✓'
        : `${this.toPersianNumber(percent)}٪ پیشرفت مطالعه ذخیره شد — دفعه بعد از همینجا ادامه می‌تونی بدی`;
      chipEl.classList.add('show');
    };

    // ---- ۱) اگه پیشرفت قبلی (از جلسه‌ی قبل) وجود داره، toast رو نشون بده ----
    const saved = this.progressStore.get(this.cat, this.slug);
    if (saved && saved.scrollY > 0 && saved.percent < 95) {
      lastSavedScrollY = saved.scrollY;
      toastTextEl.textContent = `تا ${this.toPersianNumber(saved.percent)}٪ این یادداشت رو خونده بودی`;
      // کمی صبر می‌کنیم تا محتوا کامل render و layout بشه، بعد toast رو نشون بده
      setTimeout(() => toastEl.classList.add('show'), 500);

      const hideToast = () => toastEl.classList.remove('show');

      goBtn.addEventListener('click', () => {
        scrollToSaved(saved.scrollY);
        hideToast();
      });
      dismissBtn.addEventListener('click', hideToast);

      // toast مدت زیادی (۱۲ ثانیه) روی صفحه می‌مونه؛ فقط با کلیک کاربر یا این تایمر بسته می‌شه،
      // نه با اولین حرکت جزئی اسکرول (که قبلاً باعث می‌شد خیلی زود ناپدید بشه)
      setTimeout(hideToast, 12000);

      // اگه toast بسته/ناپدید شد ولی هنوز کامل مطالعه نکرده، چیپ گوشه صفحه
      // همیشه در دسترس می‌مونه تا بشه از همونجا ادامه داد
      updateChip(saved.percent);
      chipEl.onclick = (e) => {
        if (e.target === chipCloseBtn) return;
        scrollToSaved(lastSavedScrollY);
      };
    }

    chipCloseBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      chipDismissedByUser = true;
      chipEl.classList.remove('show');
    });

    // ---- ۲) ردیابی و ذخیره‌ی پیشرفت مطالعه هنگام اسکرول (throttle شده) ----
    const onScroll = () => {
      const percent = this.calcScrollPercent();
      if (progressBarEl) progressBarEl.style.width = percent + '%';

      if (this._saveTimeout) return;
      this._saveTimeout = setTimeout(() => {
        this._saveTimeout = null;
        const currentPercent = this.calcScrollPercent();
        lastSavedScrollY = window.scrollY;
        const result = this.progressStore.save(this.cat, this.slug, {
          percent: currentPercent,
          scrollY: lastSavedScrollY,
          title: document.title
        });

        if (result && result.percent >= 95) {
          // وقتی مقاله تقریباً تمام خونده شد، دیگه لازم نیست چیزی ذخیره بمونه
          this.progressStore.clear(this.cat, this.slug);
          updateChip(100, { done: true });
          // چیپ «کامل شد» رو بعد از چند ثانیه خودش محو کن
          setTimeout(() => chipEl.classList.remove('show'), 4000);
        } else if (result && result.percent >= 3) {
          // به کاربر همیشه (نه فقط لحظه‌ی ورود) نشون بده که پیشرفتش داره ذخیره می‌شه
          updateChip(result.percent);
        }
      }, 700);
    };

    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll(); // مقدار اولیه‌ی نوار پیشرفت
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  const burger = document.getElementById('burgerBtn');
  const navLinks = document.getElementById('navLinks');
  if (burger && navLinks) {
    burger.addEventListener('click', () => navLinks.classList.toggle('open'));
    navLinks.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => navLinks.classList.remove('open'));
    });
  }

  document.querySelectorAll('#article-head .reveal').forEach(el => el.classList.add('in'));

  const viewer = new PostViewer();
  await viewer.load();


  document.querySelectorAll('blockquote').forEach(blockquote => {
    const text = blockquote.textContent.trim();
    if (!/[آ-ی]/.test(text)) {
        blockquote.style.direction = 'ltr';
    }
  });

});
</script>
