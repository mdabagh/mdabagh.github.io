<style>
  :root{
    --navy-deep:#0E2A47;
    --navy-line:#2C5580;
    --paper:#F1F3EE;
    --paper-alt:#E7EBE3;
    --ink:#10243D;
    --ink-soft:#51637A;
    --amber:#F2A541;
    --amber-dark:#C97F1E;
    --cyan-line:#8FC1DE;
    --maxw:1180px;
    --maxw-article:760px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  body{
    font-family:'Vazirmatn', sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.8;
    overflow-x:hidden;
  }

  .mono{font-family:'JetBrains Mono', monospace;}
  a{color:inherit; text-decoration:none;}
  ul{list-style:none;}
  section{position:relative;}
  :focus-visible{outline:2px solid var(--amber); outline-offset:3px;}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 28px;}
  .wrap-article{max-width:var(--maxw-article); margin:0 auto; padding:0 28px;}

  /* ---------- NAV ---------- */
  header{
    position:fixed; top:0; right:0; left:0; z-index:100;
    background:rgba(14,42,71,0.92);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--navy-line);
  }
  .nav-inner{display:flex; align-items:center; justify-content:space-between; height:64px;}
  .brand{display:flex; align-items:center; gap:12px; color:#F1F3EE;}
  .brand-mark{
    width:34px; height:34px; border:1.5px solid var(--amber);
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace; font-weight:700; font-size:12px;
    color:var(--amber); flex-shrink:0;
  }
  .brand-name{font-weight:700; font-size:15px;}
  .brand-sub{font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--cyan-line); letter-spacing:0.5px;}

  nav{display:flex; align-items:center; gap:28px;}
  nav ul{display:flex; align-items:center; gap:28px;}
  nav a:not(.nav-cta){color:#D9E2EC; font-size:14px; font-weight:500; transition:color .2s;}
  nav a:not(.nav-cta):hover{color:#fff;}
  .nav-cta{background:var(--amber); color:var(--navy-deep) !important; padding:9px 18px; font-weight:700; font-size:13px; border:1px solid var(--amber); transition:all .2s ease; border-radius:4px;}
  .nav-cta:hover{background:transparent; color:var(--amber) !important;}
  .burger{display:none; flex-direction:column; gap:5px; background:none; border:0; cursor:pointer; padding:8px;}
  .burger span{width:22px; height:2px; background:#F1F3EE; display:block; transition:all .2s ease;}
  #navLinks{display:flex; align-items:center; gap:28px;}

  @media (max-width: 860px){
    .burger{display:flex;}
    #navLinks{
      position:absolute; top:64px; right:0; left:0; background:var(--navy-deep);
      flex-direction:column; align-items:flex-start; padding:20px 28px; gap:18px;
      border-bottom:1px solid var(--navy-line); display:none;
    }
    #navLinks.open{display:flex;}
    #navLinks a{width:100%;}
  }

  .reveal{opacity:0; transform:translateY(24px); transition:opacity .7s ease, transform .7s ease;}
  .reveal.in{opacity:1; transform:none;}

  /* ================= ARTICLE HEADER (dark) ================= */
  #article-head{background:var(--navy-deep); color:#EDF1F5; padding-top:150px; padding-bottom:60px;}
  .back-link{
    display:inline-flex; align-items:center; gap:6px; font-family:'JetBrains Mono', monospace;
    font-size:12px; color:var(--cyan-line); margin-bottom:22px;
  }
  .back-link:hover{color:var(--amber);}
  .article-badge{
    display:inline-block; font-family:'JetBrains Mono', monospace; font-size:10.5px;
    padding:4px 10px; border:1px solid var(--amber); color:var(--amber); margin-bottom:16px;
  }
  #article-head h1{font-size:clamp(1.8rem, 4vw, 2.7rem); font-weight:900; line-height:1.35; margin-bottom:18px;}
  .article-meta{
    display:flex; gap:20px; flex-wrap:wrap;
    font-family:'JetBrains Mono', monospace; font-size:12.5px; color:#9FB0C3;
  }

  /* ================= ARTICLE BODY ================= */
  #article-body{background:var(--paper); padding-top:56px; padding-bottom:100px;}

  .prose{font-size:16.5px; color:var(--ink);}
  .prose > * + *{margin-top:1.15em;}
  .prose h1,.prose h2,.prose h3,.prose h4{font-weight:800; line-height:1.5; margin-top:1.8em;}
  .prose h1{font-size:1.7rem; border-bottom:2px solid var(--ink); padding-bottom:10px;}
  .prose h2{font-size:1.4rem; border-bottom:1px solid #D8DED6; padding-bottom:8px;}
  .prose h3{font-size:1.18rem; color:var(--amber-dark);}
  .prose h4{font-size:1.02rem;}
  .prose p{line-height:1.9;}
  .prose a{color:var(--amber-dark); border-bottom:1px solid var(--amber-dark);}
  .prose a:hover{color:var(--amber);}
  .prose strong{font-weight:800;}
  .prose em{font-style:italic;}
  .prose ul,.prose ol{padding-inline-start:1.6em;}
  .prose ul{list-style:disc;}
  .prose ol{list-style:decimal;}
  .prose li + li{margin-top:.4em;}
  .prose blockquote{
    border-inline-start:3px solid var(--amber); background:var(--paper-alt);
    padding:14px 20px; color:var(--ink-soft); font-size:15.5px;
  }
  .prose code{
    font-family:'JetBrains Mono', monospace; font-size:.86em; background:var(--paper-alt);
    padding:2px 6px; border-radius:3px; color:var(--amber-dark); direction:ltr; unicode-bidi:embed;
  }
  .prose pre{
    background:var(--navy-deep); color:#DCE5EE; padding:18px 20px; overflow-x:auto;
    border:1px solid var(--navy-line); direction:ltr; text-align:left;
  }
  .prose pre code{background:none; padding:0; color:inherit; font-size:13.5px; line-height:1.7;}
  .prose img{max-width:100%; height:auto; border:1px solid #D8DED6;}
  .prose hr{border:none; border-top:1px dashed #C9D0C2; margin:2em 0;}
  .prose table{width:100%; border-collapse:collapse; font-size:14.5px;}
  .prose th,.prose td{border:1px solid #D8DED6; padding:9px 12px; text-align:right;}
  .prose th{background:var(--paper-alt); font-weight:700;}

  .loading, .empty, .error{text-align:center; padding:60px 0; color:var(--ink-soft);}
  .loading::after{content:''; animation:dots 1.4s steps(4) infinite;}
  @keyframes dots{0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%{content:'...';}}
  .error{color:#c0392b;}
  .error small{display:block; margin-top:6px; font-family:'JetBrains Mono', monospace; font-size:11.5px;}

  footer{background:var(--navy-deep); color:#9FB0C3; padding:34px 0; text-align:center; font-size:13px; font-family:'JetBrains Mono', monospace;}
  footer span{color:var(--amber);}

<script type="importmap">
{
  "imports": {
    "markdown-it": "https://cdn.jsdelivr.net/npm/markdown-it@14.3.0/+esm"
  }
}
</script>

<script type="module">
import markdownIt from 'markdown-it';

const SITE_BASE = 'https://mdabagh.github.io';

function setMeta(id, content) {
  const el = document.getElementById(id);
  if (el) el.setAttribute('content', content);
}

function setCanonical(url) {
  const el = document.getElementById('canonicalLink');
  if (el) el.href = url;
}

function injectSchema(data) {
  const old = document.getElementById('pageSchema');
  if (old) old.remove();
  const script = document.createElement('script');
  script.id = 'pageSchema';
  script.type = 'application/ld+json';
  script.textContent = JSON.stringify(data);
  document.head.appendChild(script);
}

// ============================================
// نمایش یک پست — تک صفحه‌ی generic برای همه‌ی دسته‌ها
// آدرس: blog/post.html?cat=design-system&slug=FORWARD
// ============================================

class PostViewer {
  constructor() {
    this.md = markdownIt({
      html: false,       // اجازه‌ی HTML خام نده (امنیت)
      linkify: true,      // آدرس‌های خام رو خودکار لینک کن
      typographer: false, // برای متن فارسی خاموش بمونه بهتره
      breaks: false
    });
    const params = new URLSearchParams(window.location.search);
    this.cat = params.get('cat');
    this.slug = params.get('slug');
  }

  formatDate(dateStr) {
    try {
      return new Date(dateStr).toLocaleDateString('fa-IR', { year: 'numeric', month: 'long', day: 'numeric' });
    } catch (e) {
      return dateStr;
    }
  }

  toPersianNumber(num) {
    const persian = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
    return num.toString().replace(/\d/g, d => persian[parseInt(d)]);
  }

  estimateReadTime(text) {
    const words = text.trim().split(/\s+/).length;
    const minutes = Math.max(1, Math.round(words / 180));
    return `${this.toPersianNumber(minutes)} دقیقه مطالعه`;
  }

  showError(message) {
    document.getElementById('articleTitle').textContent = 'یادداشت پیدا نشد';
    document.getElementById('articleContent').innerHTML = `
      <div class="error">
        <p>${message}</p>
        <small>مسیر مورد انتظار: blog/${this.cat || '{cat}'}/markdouns/${this.slug || '{slug}'}.json</small>
      </div>
    `;
  }

  async load() {
    if (!this.cat || !this.slug) {
      this.showError('دسته‌بندی یا اسلاگ پست در آدرس مشخص نشده (?cat=...&slug=...)');
      return;
    }

    // لینک بازگشت به صفحه دسته‌بندی
    document.getElementById('backLink').href = `category.html?cat=${this.cat}`;

    // اسم دسته‌بندی برای نشان‌دادن بج
    try {
      const catRes = await fetch(`${this.cat}/detals.json`);
      if (catRes.ok) {
        const catData = await catRes.json();
        if (catData.name) {
          const catEl = document.getElementById('articleCategory');
          catEl.textContent = catData.name;
          catEl.style.display = 'inline-block';
        }
      }
    } catch (e) {
      console.error('Error loading category info:', e);
    }

    let postData;
    try {
      const res = await fetch(`${this.cat}/markdouns/${this.slug}.json`);
      if (!res.ok) throw new Error('فایل متادیتای پست پیدا نشد');
      postData = await res.json();
    } catch (e) {
      this.showError('این یادداشت پیدا نشد یا هنوز منتشر نشده.');
      return;
    }

    let mdContent = '';
    try {
      const mdRes = await fetch(`${this.cat}/markdouns/${this.slug}.md`);
      if (mdRes.ok) mdContent = await mdRes.text();
    } catch (e) {
      console.error('Error loading markdown file:', e);
    }

    const pageUrl = `${SITE_BASE}/blog/post.html?cat=${this.cat}&slug=${this.slug}`;
    const title = `${postData.title || 'یادداشت'} — بلاگ محمدسجاد دباغ`;
    const description = postData.summary || 'یادداشت فنی محمدسجاد دباغ';

    document.title = title;
    document.getElementById('pageTitle').textContent = title;
    setMeta('metaDescription', description);
    setMeta('ogTitle', title);
    setMeta('ogDescription', description);
    setMeta('ogUrl', pageUrl);
    setMeta('twitterTitle', title);
    setMeta('twitterDescription', description);
    setCanonical(pageUrl);

    const catName = document.getElementById('articleCategory').textContent || this.cat;
    injectSchema({
      '@context': 'https://schema.org',
      '@type': 'BlogPosting',
      headline: postData.title || 'یادداشت',
      description: description,
      datePublished: postData.date || undefined,
      author: { '@type': 'Person', name: 'محمدسجاد دباغ', url: SITE_BASE },
      url: pageUrl,
      inLanguage: 'fa',
      isPartOf: { '@type': 'Blog', name: 'بلاگ محمدسجاد دباغ', url: `${SITE_BASE}/blog/` },
      breadcrumb: {
        '@type': 'BreadcrumbList',
        itemListElement: [
          { '@type': 'ListItem', position: 1, name: 'بلاگ', item: `${SITE_BASE}/blog/` },
          { '@type': 'ListItem', position: 2, name: catName, item: `${SITE_BASE}/blog/category.html?cat=${this.cat}` },
          { '@type': 'ListItem', position: 3, name: postData.title, item: pageUrl }
        ]
      }
    });

    document.getElementById('articleTitle').textContent = postData.title || 'بدون عنوان';
    document.getElementById('articleDate').textContent = postData.date ? this.formatDate(postData.date) : '';
    document.getElementById('articleReadTime').textContent = mdContent ? this.estimateReadTime(mdContent) : '';

    const contentEl = document.getElementById('articleContent');
    if (!mdContent) {
      contentEl.innerHTML = `<div class="empty">متن این یادداشت هنوز نوشته نشده.</div>`;
      return;
    }

    const html = this.md.render(mdContent);
    contentEl.innerHTML = `<article class="prose">${html}</article>`;

    this.revealAll();
  }

  revealAll() {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  const burger = document.getElementById('burgerBtn');
  const navLinks = document.getElementById('navLinks');
  if (burger && navLinks) {
    burger.addEventListener('click', () => navLinks.classList.toggle('open'));
    navLinks.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => navLinks.classList.remove('open'));
    });
  }

  document.querySelectorAll('#article-head .reveal').forEach(el => el.classList.add('in'));

  const viewer = new PostViewer();
  await viewer.load();
});
</script>

</body>
